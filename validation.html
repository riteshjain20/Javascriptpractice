<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validation</title>
  <style>
    .form_container {
      margin: auto;
    }
    .form_container h3 {
      text-align: center;
    }
    table{
      border: 1px solid #000;
      border-collapse: collapse;
      margin: auto;
    }
    td{
      padding: 10px;
    }
    .error {
      font-size: 12px;
      color: red;
    }
  </style>
</head>
<body>
  <div class="form_container">
    <h3>Register Here !!</h3>
    <table>
      <form action="" method="post" onsubmit="return validate()">
        <tr>
          <td><label for="fname">First Name</label></td>
          <td>
            <input type="text" id="fname" name="fname"><br>
            <span class="error" id="fnameerror"></span>
          </td>
        </tr>
        <tr>
          <td><label for="lname">Last Name</label></td>
          <td>
            <input type="text" id="lname" name="lname"><br>
            <span class="error" id="lnameerror"></span>
          </td>
        </tr>
        <tr>
          <td><label for="email">Email</label></td>
          <td>
            <input type="email" id="email" name="email"><br>
            <span class="error" id="emailerror"></span>
          </td>
        </tr>
        <tr>
          <td><label for="pass">Password</label></td>
          <td>
            <input type="password" id="pass" name="pass"><br>
            <span class="error" id="passerror"></span>
          </td>
        </tr>
        <tr>
          <td>
            <label for="gender">Gender</label>
          </td>
          <td>
            <input type="radio" name="gen" id="male">
            <label for="male">Male</label>
            <input type="radio" name="gen" id="female">
            <label for="female">Female</label><br>
            <span class="error" id="gendererror"></span>
          </td>
        </tr>
        <tr>
          <td><label for="skill">Skills</label></td>
          <td>
            <input type="checkbox" name="skill" id="html">
            <label for="html">HTML</label>
            <input type="checkbox" name="skill" id="css">
            <label for="css">CSS</label> 
            <input type="checkbox" name="skill" id="js">
            <label for="js">JavaScript</label><br>
            <span class="error" id="skillerror"></span> 
          </td>
        </tr>
        <tr>
          <td><label for="city">City</label></td>
          <td>
            <select name="city" id="city">
              <option value="">Select City</option>
              <option value="delhi">Delhi</option>
              <option value="mumbai">Mumbai</option>
              <option value="kolkata">Kolkata</option>
              <option value="chennai">Chennai</option>
            </select><br>
            <span class="error" id="cityerror"></span>
          </td>
        </tr>
        <tr>
          <td></td>
          <td><input type="submit" value="Register"></td>
        </tr>
      </form>
    </table>
  </div>
  <script>
    function validate(){
      document.getElementById("fnameerror").innerHTML = "";
      document.getElementById("lnameerror").innerHTML = "";
      document.getElementById("emailerror").innerHTML = "";
      document.getElementById("passerror").innerHTML = "";
      document.getElementById("gendererror").innerHTML = "";
      document.getElementById("skillerror").innerHTML = "";
      document.getElementById("cityerror").innerHTML = "";
      var fname = document.getElementById("fname").value;
      var lname = document.getElementById("lname").value;
      var email = document.getElementById("email").value;
      var pass = document.getElementById("pass").value;
      var gender = document.querySelector('input[name="gen"]:checked');
      var skills = document.querySelectorAll('input[name="skill"]:checked');
      var city = document.getElementById("city").value;
      if(fname == ""){
        document.getElementById("fnameerror").innerHTML = "First name is required";
        return false;
      }
      else if(lname == ""){
        document.getElementById("lnameerror").innerHTML = "Last name is required";
        return false;
      }
      else if(email == ""){
        document.getElementById("emailerror").innerHTML = "Email is required";
        return false;
      }
      else if(pass == ""){
        document.getElementById("passerror").innerHTML = "Password is required";
        return false;
      }
      else if(!gender){
        document.getElementById("gendererror").innerHTML = "Gender is required";
        return false;
      }
      else if(skills.length == 0){
        document.getElementById("skillerror").innerHTML = "Select any one skill";
        return false;
      }
      else if(city == ""){
        document.getElementById("cityerror").innerHTML = "select any one city";
        return false;
      }
    }
  </script>
</body>
</html>
